specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Chartmetric
providerId: chartmetric
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Music
- Analytics
- Artist Intelligence
- Streaming
- Charts
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Chartmetric Developer API spend. Chartmetric bills through a
  sales-led, seat-based subscription model rather than transparent
  pay-as-you-go metering. Entry API access is reported around $350 per user per
  month with a 1 request-per-second limit; higher request rates, additional
  seats, Data Shares, and the MCP server are quoted directly by Chartmetric.
  Because there is no published usage-metered rate card, the meters below model
  cost drivers (seats, request rate, data-share contracts) at a coarse grain
  and are not reconciled.
notes: >-
  No public usage-based rate card is published; spend is governed by negotiated
  subscription and data-share contracts. Verify seat counts, request-rate
  tiers, and data-share fees with Chartmetric sales during reconciliation.
sources:
- https://chartmetric.com/features/developer-api
- https://chartmetric.com/contact-us/developer-api
- https://chartmetric.com/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Chartmetric
serviceCategory: Analytics
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: api_seats
  description: Developer API seats provisioned, billed per user per month under subscription.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - team
- name: request_rate_tier
  description: Negotiated request-per-second tier governing throughput (entry 1 RPS up to ~25 RPS scaled).
  unit: requests_per_second
  aggregation: max
  dimensions:
  - account
- name: data_share_contracts
  description: Active Data Share delivery agreements (Snowflake, Amazon S3, Google Cloud Storage), billed per contract.
  unit: contracts
  aggregation: sum
  dimensions:
  - account
  - warehouse
- name: mcp_access
  description: Model Context Protocol server access for AI workflows, billed per agreement.
  unit: contracts
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track provisioned API seats, the negotiated request-rate tier, and any active data-share contracts against the Chartmetric agreement.
- name: Allocation
  description: Map API seats and data-share deliveries to the teams and workloads consuming Chartmetric data.
- name: Optimization
  description: Right-size seat counts and request-rate tier to actual usage; prefer Data Shares for bulk analytics instead of high-volume per-request polling where it lowers total cost.
- name: Accountability
  description: Assign an owner for the Chartmetric contract; review seat utilization and request volume against the negotiated tier each billing cycle.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
