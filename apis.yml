aid: chartmetric
url: https://raw.githubusercontent.com/api-evangelist/chartmetric/refs/heads/main/apis.yml
name: Chartmetric
kind: company
description: Chartmetric is a music analytics and artist-intelligence platform. Its
  REST API exposes the company's catalog of artists, tracks, albums, playlists, and
  charts along with cross-platform streaming, social, and radio statistics across
  Spotify, Apple Music, YouTube, TikTok, Instagram, and more, plus a unified search
  endpoint.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Music
- Analytics
- Artist Intelligence
- Streaming
- Charts
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
